<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEDIAFORGE AI</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Orbitron:wght@500;700;800&display=swap" rel="stylesheet">

<style>

body{
    font-family:'Inter',sans-serif;
    overflow-x:hidden;
    background:#050505;
}

.logo-font{
    font-family:'Orbitron',sans-serif;
}

.glow-red{
    box-shadow:0 0 25px rgba(239,68,68,0.35);
}

.card-glow:hover{
    box-shadow:0 0 30px rgba(239,68,68,0.20);
    transform:translateY(-5px);
}

.bg-grid{
    background-image:
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size:40px 40px;
}

.pulse-glow{
    animation:pulseGlow 3s infinite;
}

@keyframes pulseGlow{
    0%{
        box-shadow:0 0 10px rgba(239,68,68,0.2);
    }
    50%{
        box-shadow:0 0 30px rgba(239,68,68,0.5);
    }
    100%{
        box-shadow:0 0 10px rgba(239,68,68,0.2);
    }
}

.floating{
    animation:float 5s ease-in-out infinite;
}

@keyframes float{
    0%{transform:translateY(0px)}
    50%{transform:translateY(-10px)}
    100%{transform:translateY(0px)}
}

</style>
</head>

<body class="text-white bg-grid">

<div class="fixed inset-0 -z-10 overflow-hidden">
    <div class="absolute top-0 left-0 w-[500px] h-[500px] bg-red-500/20 blur-3xl rounded-full"></div>
    <div class="absolute bottom-0 right-0 w-[500px] h-[500px] bg-orange-500/10 blur-3xl rounded-full"></div>
</div>

<nav class="w-full border-b border-white/10 backdrop-blur-xl sticky top-0 z-50 bg-black/30">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">

        <div>
            <h1 class="logo-font text-2xl font-bold tracking-widest text-red-500">
                MEDIAFORGE AI
            </h1>
            <p class="text-xs text-gray-400 tracking-[3px] mt-1">
                BLACKFYR3 SYSTEMS
            </p>
        </div>

        <div class="hidden md:flex items-center gap-8 text-sm text-gray-300">
            <a href="#utilities" class="hover:text-red-400 transition">Utilities</a>
            <a href="#features" class="hover:text-red-400 transition">Features</a>
            <a href="#status" class="hover:text-red-400 transition">Status</a>
            <a href="#contact" class="hover:text-red-400 transition">Contact</a>
        </div>

        <div class="hidden md:flex items-center gap-2 bg-green-500/10 border border-green-500/20 px-4 py-2 rounded-full">
            <div class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></div>
            <span class="text-green-300 text-sm">Systems Online</span>
        </div>

    </div>
</nav>

<section class="relative min-h-screen flex items-center justify-center px-6 py-24">

    <div class="max-w-5xl mx-auto text-center">

        <div class="inline-flex items-center gap-3 bg-white/5 border border-white/10 rounded-full px-5 py-2 mb-8 backdrop-blur-lg floating">
            <div class="w-2 h-2 bg-red-500 rounded-full animate-pulse"></div>
            <span class="text-sm text-gray-300 tracking-wide">
                Creator Command Center
            </span>
        </div>

        <h1 class="logo-font text-5xl md:text-7xl font-extrabold leading-tight tracking-wider mb-6">
            <span class="text-white">MEDIA</span>
            <span class="text-red-500">FORGE</span>
            <span class="text-orange-400"> AI</span>
        </h1>

        <p class="text-xl md:text-2xl text-gray-300 max-w-3xl mx-auto leading-relaxed mb-10">
            Modern social media utilities for creators, editors, streamers, and digital workflows.
        </p>

        <div class="max-w-3xl mx-auto bg-white/5 border border-white/10 rounded-3xl p-4 backdrop-blur-2xl glow-red pulse-glow">

            <div class="flex flex-col md:flex-row gap-4">

                <input
                id="url"
                type="text"
                placeholder="Paste TikTok, Instagram, Facebook, or X link"
                class="flex-1 bg-black/40 border border-white/10 rounded-2xl px-6 py-5 text-white outline-none focus:border-red-500 text-lg"
                >

                <button
                onclick="downloadVideo()"
                class="bg-gradient-to-r from-red-500 to-orange-500 hover:scale-105 transition duration-300 px-10 py-5 rounded-2xl font-semibold text-lg shadow-xl shadow-red-500/30">
                Download
                </button>

            </div>

        </div>

    </div>

</section>

<script>

function downloadVideo(){

    let url=document.getElementById("url").value;

    if(url==""){
        alert("Paste a media link first");
        return;
    }

    window.open(
        "https://blackfyre-api.onrender.com/download?url="+
        encodeURIComponent(url)
    );

}

</script>

</body>
</html>
